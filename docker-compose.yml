name: nightcore

networks:
  nightcore-network:
    name: nightcore-network
    driver: bridge

services:
  nightcore-bot:
    image: nightcore-bot:latest
    container_name: nightcore-bot
    build:
      context: .
      dockerfile: Dockerfile
    restart: no
    env_file:
      - .env

    volumes:
      - ./src/:/app/src/
      - ./main.py:/app/main.py
      - ./alembic.ini:/app/alembic.ini
      - ./migrations/:/app/migrations/
    networks:
      - nightcore-network

    depends_on:
      nightcore-db:
        condition: service_healthy
      nightcore-redis:
        condition: service_healthy

  nightcore-db:
    image: postgres:16-alpine
    container_name: nightcore-db
    restart: no
    env_file:
      - .env

    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready --username=nightcore --dbname=nightcore" ]
      interval: 5s
      timeout: 3s
      retries: 5

    networks:
      - nightcore-network

  nightcore-redis:
    image: redis:7-alpine
    container_name: nightcore-redis
    restart: no

    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"

    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

    networks:
      - nightcore-network

  nightcore-redisinsight:
    image: redis/redisinsight:latest
    container_name: nightcore-redisinsight
    restart: no

    ports:
      - "${REDIS_INSIGHT_PORT}:${REDIS_INSIGHT_PORT}"

    depends_on:
      nightcore-redis:
        condition: service_healthy

    networks:
      - nightcore-network

  traefik:
    image: traefik:v3.7.1
    container_name: nightcore-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=false

      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=nightcore-network

      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --entrypoints.websecure.address=:443

      - --log.level=INFO
      - --accesslog=true
      - --accesslog.format=json

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./acme.json:/acme.json

    networks:
      - nightcore-network

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.sdfgdfgdfg.tech`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"